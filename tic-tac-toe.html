<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 120px);
      grid-template-rows: repeat(3, 120px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.4s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2.5rem;
      font-size: 1rem;
      font-weight: bold;
      letter-spacing: 2px;
      background: #e94560;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #score {
      display: flex;
      gap: 3rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box { text-align: center; }
    .score-box span { font-size: 2rem; font-weight: bold; }
    .score-box.x-score span { color: #e94560; }
    .score-box.o-score span { color: #a8dadc; }
    .score-box.draw-score span { color: #888; }
  </style>
</head>
<body>
  <h1>TIC TAC TOE</h1>

  <div id="score">
    <div class="score-box x-score">X<br><span id="scoreX">0</span></div>
    <div class="score-box draw-score">Draws<br><span id="scoreDraw">0</span></div>
    <div class="score-box o-score">O<br><span id="scoreO">0</span></div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">NEW GAME</button>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8], // rows
      [0,3,6],[1,4,7],[2,5,8], // cols
      [0,4,8],[2,4,6]          // diags
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let over = false;
    let score = { X: 0, O: 0, Draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');

    cells.forEach(cell => cell.addEventListener('click', () => {
      const i = +cell.dataset.i;
      if (over || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add(current.toLowerCase(), 'taken');

      const win = checkWin();
      if (win) {
        win.forEach(i => cells[i].classList.add('win'));
        status.textContent = `Player ${current} wins!`;
        score[current]++;
        updateScore();
        over = true;
      } else if (board.every(Boolean)) {
        status.textContent = "It's a draw!";
        score.Draw++;
        updateScore();
        over = true;
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `Player ${current}'s turn`;
      }
    }));

    function checkWin() {
      for (const combo of WINS) {
        if (combo.every(i => board[i] === current)) return combo;
      }
      return null;
    }

    function updateScore() {
      document.getElementById('scoreX').textContent = score.X;
      document.getElementById('scoreO').textContent = score.O;
      document.getElementById('scoreDraw').textContent = score.Draw;
    }

    document.getElementById('reset').addEventListener('click', () => {
      board = Array(9).fill(null);
      current = 'X';
      over = false;
      status.textContent = "Player X's turn";
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    });
  </script>
</body>
</html>
